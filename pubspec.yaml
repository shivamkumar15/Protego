name: protego
description: "Guardian Safety App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4

  # Social Sign-In
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4

  # Utilities
  crypto: ^3.0.6
  shared_preferences: ^2.3.2
  country_picker: ^2.0.27

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/LightThemeLogo.png
    - assets/DarkThemeLogo.png
