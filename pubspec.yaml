name: protego
description: "Guardian Safety App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4

  # Social Sign-In
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4

  # Utilities
  crypto: ^3.0.6
  shared_preferences: ^2.3.2
  country_picker: ^2.0.27
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  http: ^1.6.0
  path: ^1.9.1
  path_provider: ^2.1.5
  record: ^6.1.1
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  supabase_flutter: ^2.12.4
  image_picker: ^1.2.0
  camera: ^0.11.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/MainIcon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/MainIcon.png
  adaptive_icon_foreground_inset: 4

flutter:
  uses-material-design: true
  assets:
    - assets/
